openapi: 3.0.0
info:
  title: Help Desk Ticket API
  version: 1.0.0
  description: API for creating, retrieving, updating, and deleting help desk tickets.

paths:
  /tickets:
    get:
      summary: Get all tickets
      responses:
        '200':
          description: A list of tickets
    post:
      summary: Create a new ticket
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                title:
                  type: string
                description:
                  type: string
      responses:
        '201':
          description: Ticket created

  /tickets/{id}:
    get:
      summary: Get a ticket by ID
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Ticket details

    put:
      summary: Update a ticket
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                title:
                  type: string
                description:
                  type: string
      responses:
        '200':
          description: Ticket updated

    delete:
      summary: Delete a ticket
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        '204':
          description: Ticket deleted
